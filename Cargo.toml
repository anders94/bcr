[package]
name = "bcr"
version = "0.1.0"
edition = "2021"

[dependencies]
libc = "0.2"
nix = { version = "0.31", features = ["net", "socket", "ioctl", "poll", "user"] }
socket2 = "0.5"
pnet = "0.35"
clap = { version = "4.5", features = ["derive"] }
anyhow = "1.0"
thiserror = "1.0"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
panic = "abort"
