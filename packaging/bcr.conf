# /etc/bcr.conf — Broadcast Relay configuration. See bcr(8).
#
# Rule format:
#   ACTION PROTO SRC_IP[:SRC_PORT] DST_IP[:DST_PORT] [NAT_OPTIONS]
#
#   ACTION    allow | deny
#   PROTO     udp | any            (TCP is not relayed)
#   SRC_IP    x.x.x.x | x.x.x.x/n | any
#   DST_IP    x.x.x.x | x.x.x.x/n | 255.255.255.255 | directed | any
#   *_PORT    port | start-end | any
#
#   NAT_OPTIONS (optional, allow rules only):
#     snat=IP     rewrite source IP
#     dnat=IP     rewrite destination IP
#     sport=PORT  rewrite source port
#     dport=PORT  rewrite destination port
#
# Rules are evaluated top-to-bottom; the FIRST match wins. Deny-by-default is
# built in: any packet that matches no rule is dropped, so no trailing
# "deny any any:any any:any" is needed.
#
# Parsing is strict: typos, bad values, inverted port ranges, and NAT options
# on a deny rule are startup errors, not silent no-ops.
#
# This shipped default is a STARTING POINT. A broadcast relay moves traffic
# between otherwise-isolated segments, so trim it to only what you need before
# enabling the service (systemctl enable --now bcr).

# --- Windows / SMB discovery -------------------------------------------------
# NetBIOS name service, datagram service, and session service.
allow udp any:137-139 255.255.255.255:137-139

# --- DHCP --------------------------------------------------------------------
# Relay DHCP discover/offer broadcasts. Scope SRC_IP if you can.
allow udp any:67-68 255.255.255.255:67-68

# --- Zero-config / service discovery (multicast) -----------------------------
# mDNS / Bonjour / Avahi
allow udp any:5353 224.0.0.251:5353
# SSDP / UPnP
allow udp any:1900 239.255.255.250:1900

# --- Directed broadcasts from a trusted subnet -------------------------------
# Relay subnet-directed broadcasts that originate from 10.0.0.0/24.
allow udp 10.0.0.0/24:any directed:any

# --- Example with source NAT -------------------------------------------------
# Relay SSDP from 192.168.1.0/24 but masquerade the source as the relay's
# address on the destination segment.
# allow udp 192.168.1.0/24:1900 255.255.255.255:1900 snat=10.0.0.1
