# Minimal test config — used by the README veth walkthrough.
#
# Allows all UDP broadcast and multicast so you can verify relaying end to end.
# This is intentionally permissive; do not use it in production.
#
# (Deny-by-default is built in, so no trailing "deny" rule is needed.)

# Limited broadcast (e.g. the README's test to 255.255.255.255:9999)
allow udp any:any 255.255.255.255:any

# Subnet-directed broadcasts (e.g. 192.168.100.255)
allow udp any:any directed:any

# Multicast (mDNS, SSDP, ...)
allow udp any:any 224.0.0.0/4:any
