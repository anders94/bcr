# bcr.conf - Broadcast relay configuration
# Format: ACTION PROTO SRC_IP[:SRC_PORT] DST_IP[:DST_PORT] [NAT_OPTIONS]
#
# ACTION:  allow | deny
# PROTO:   udp | any   (TCP is not relayed)
# SRC_IP:  x.x.x.x | x.x.x.x/CIDR | any
# DST_IP:  x.x.x.x | x.x.x.x/CIDR | 255.255.255.255 | directed | any
# SRC_PORT: port_number | port_range | any
# DST_PORT: port_number | port_range | any
#
# NAT_OPTIONS (optional, space-separated):
#   snat=IP           - Rewrite source IP
#   dnat=IP           - Rewrite dest IP
#   sport=PORT        - Rewrite source port
#   dport=PORT        - Rewrite dest port

# Allow NetBIOS broadcasts (Windows file sharing)
allow udp any:137-139 255.255.255.255:137-139

# Allow DHCP broadcasts
allow udp any:67-68 255.255.255.255:67-68

# Allow directed broadcasts from 10.0.0.0/24 subnet
allow udp 10.0.0.0/24:any directed:any

# Allow UPnP/SSDP with source NAT
allow udp 192.168.1.0/24:1900 255.255.255.255:1900 snat=10.0.0.1

# Allow mDNS (Bonjour/Avahi)
allow udp any:5353 255.255.255.255:5353

# Default deny all (important for security)
deny any any:any any:any
